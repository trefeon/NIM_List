name: Benchmark NVIDIA NIM Models (Parallel)

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:     # Allow manual trigger

jobs:
  test_models:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    strategy:
      matrix:
        model_group: [group1, group2]
      max-parallel: 2
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run benchmarks for model group
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          MODEL_GROUP: ${{ matrix.model_group }}
        run: |
          chmod +x scripts/test-models.sh
          cd scripts && bash test-models.sh "$MODEL_GROUP"
      
      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: results-${{ matrix.model_group }}
          path: scripts/results-${{ matrix.model_group }}.json
          retention-days: 1

  merge_results:
    needs: test_models
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download all results
        uses: actions/download-artifact@v3
      
      - name: Merge results
        run: |
          chmod +x scripts/merge-results.sh
          cd scripts && bash merge-results.sh
      
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json results.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update benchmark results" && git push)
